name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Cache elan toolchain (~300MB) — lean-action only caches .lake/
      - name: cache elan toolchain
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}

      - uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
        with:
          build: true
          build-args: "--quiet"
          use-github-cache: true

      - name: publish legacy status context "build"
        if: ${{ always() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success'
              : process.env.JOB_STATUS === 'cancelled' ? 'error'
              : 'failure';
            const description = state === 'success' ? 'build passed' : `build ${state}`;
            const target_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shas = new Set([context.sha]);
            if (context.eventName === 'pull_request') {
              shas.add(context.payload.pull_request.head.sha);
            }
            for (const sha of shas) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'build',
                description,
                target_url,
              });
            }
