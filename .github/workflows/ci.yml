name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: reject sorry/admit placeholders in committed Lean files
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          ROOT = Path("RubinFormal")
          LEAN_FILES = sorted(ROOT.rglob("*.lean"))

          SORRY_RE = re.compile(r"(?<![A-Za-z0-9_'])sorry(?![A-Za-z0-9_'])")
          ADMIT_PATTERNS = (
              re.compile(r"^\s*admit\s*$"),
              re.compile(r"(?<![A-Za-z0-9_'])by\s+admit(?![A-Za-z0-9_'])"),
              re.compile(r":=\s*admit\s*(?:$|[),\]}])"),
              re.compile(r"(?<![A-Za-z0-9_'])(?:exact|refine)\s+admit(?![A-Za-z0-9_'])"),
          )

          def strip_comments_and_strings(text: str) -> str:
              out: list[str] = []
              i = 0
              block_depth = 0
              in_string = False
              while i < len(text):
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < len(text) else ""
                  if block_depth > 0:
                      if ch == "/" and nxt == "-":
                          block_depth += 1
                          i += 2
                          continue
                      if ch == "-" and nxt == "/":
                          block_depth -= 1
                          i += 2
                          continue
                      if ch == "\n":
                          out.append("\n")
                      i += 1
                      continue
                  if in_string:
                      if ch == "\\":
                          i += 2
                          continue
                      if ch == '"':
                          in_string = False
                      elif ch == "\n":
                          out.append("\n")
                      i += 1
                      continue
                  if ch == "/" and nxt == "-":
                      block_depth = 1
                      i += 2
                      continue
                  if ch == "-" and nxt == "-":
                      while i < len(text) and text[i] != "\n":
                          i += 1
                      continue
                  if ch == '"':
                      in_string = True
                      i += 1
                      continue
                  out.append(ch)
                  i += 1
              return "".join(out)

          findings: list[str] = []
          for path in LEAN_FILES:
              cleaned = strip_comments_and_strings(path.read_text(encoding="utf-8"))
              for lineno, line in enumerate(cleaned.splitlines(), start=1):
                  if SORRY_RE.search(line):
                      findings.append(f"{path}:{lineno}: sorry placeholder")
                      continue
                  if any(pattern.search(line) for pattern in ADMIT_PATTERNS):
                      findings.append(f"{path}:{lineno}: admit placeholder")

          if findings:
              print("Lean placeholder scan failed:")
              for finding in findings:
                  print(finding)
              sys.exit(1)

          print("Lean placeholder scan passed")
          PY

      # Cache elan toolchain (~300MB) — lean-action only caches .lake/
      - name: cache elan toolchain
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}

      - uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
        with:
          build: true
          build-args: "--quiet"
          use-github-cache: true

      - name: publish legacy status context "build"
        if: ${{ always() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success'
              : process.env.JOB_STATUS === 'cancelled' ? 'error'
              : 'failure';
            const description = state === 'success' ? 'build passed' : `build ${state}`;
            const target_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shas = new Set([context.sha]);
            if (context.eventName === 'pull_request') {
              shas.add(context.payload.pull_request.head.sha);
            }
            for (const sha of shas) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'build',
                description,
                target_url,
              });
            }
