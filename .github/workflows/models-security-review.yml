name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Download diff artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: pr-diff
      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const rawOutputPath = 'deepseek-raw-output.txt';
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 128000);
            const prTitle = context.payload.pull_request?.title ?? '';
            const prBody = (context.payload.pull_request?.body ?? '').slice(0, 4000);
            const repoRoot = process.cwd();
            const repoRootReal = fs.realpathSync(repoRoot);
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            const headSha = '${{ github.event.pull_request.head.sha }}';
            const changedLeanFiles = execSync(
              `git diff --diff-filter=ACMR --name-only ${baseSha} ${headSha} -- '*.lean'`,
              { maxBuffer: 20 * 1024 * 1024 }
            )
              .toString()
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);
            const readChangedLeanFile = (file) => {
              const fullPath = path.resolve(repoRoot, file);
              const rel = path.relative(repoRoot, fullPath);
              if (rel.startsWith('..') || path.isAbsolute(rel)) {
                throw new Error(`Unsafe changed Lean path outside repository: ${file}`);
              }
              const st = fs.lstatSync(fullPath);
              if (st.isSymbolicLink()) {
                throw new Error(`Refusing to read symlinked changed Lean file: ${file}`);
              }
              if (!st.isFile()) {
                throw new Error(`Changed Lean path is not a regular file: ${file}`);
              }
              const realPath = fs.realpathSync(fullPath);
              if (!(realPath === repoRootReal || realPath.startsWith(`${repoRootReal}${path.sep}`))) {
                throw new Error(`Resolved changed Lean file escapes repository root: ${file}`);
              }
              return fs.readFileSync(realPath, 'utf8');
            };
            const changedFilePayload = changedLeanFiles
              .map((file) => {
                const content = readChangedLeanFile(file).slice(0, 8000);
                return `FILE: ${file}\n${content}`;
              })
              .join('\n\n---\n\n')
              .slice(0, 64000);
            const systemPrompt = [
              '<role>',
              'You are a HOSTILE formal verification reviewer — a merge gate for Lean 4 / RUBIN protocol PRs.',
              'Your job is NOT to help the author look convincing. Your job is to BREAK their claims until only genuinely proven coverage remains.',
              'Default stance: every claim is FALSE until tied to live code or an honest bridge theorem.',
              '</role>',
              '',
              '<context>',
              'Stack: Lean 4 v4.6.0 + std4 (no Mathlib). Pipeline: RUBIN_L1_CANONICAL.md spec → Go → Rust → conformance → Lean.',
              'Crypto: ML-DSA-87. Post-quantum. This is a blockchain protocol with UTXO model.',
              '</context>',
              '',
              '<trust-nothing>',
              'NEVER accept any of the following as proof of real closure:',
              '- theorem name or docstring',
              '- PR title or body text',
              '- requirement matrix / proof_coverage / registry',
              '- build pass or "zero sorry"',
              '- author explanations without theorem-level confirmation',
              '',
              'ONLY inspect:',
              '1. Exact statement of the theorem (the proposition after the colon)',
              '2. Proof body (what tactics/terms actually prove)',
              '3. Which exact def/function the theorem covers',
              '4. Whether there is a LIVE path or proven BRIDGE to it',
              '5. Whether the statement is overclaimed relative to what is actually proven',
              '</trust-nothing>',
              '',
              '<red-flags>',
              'Flag as defect if you see ANY of these:',
              '',
              'OVERCLAIM: theorem promises "behavioral"/"structural"/"live"/"full"/"universal"/"end-to-end"/"wired" but actually proves only isSome, rfl, simp, field projection, alias, local predicate, or narrow special case.',
              '',
              'HELPER-WITHOUT-BRIDGE: theorem proven on a separate helper/model def, no theorem connecting it to the real live function, yet PR/matrix claims FULL.',
              '',
              'PREDICATE-NOT-STATE-EFFECT: proven "output marked X" but not "does not enter UTXO set"; proven "list property" but not "actual map/state transition effect"; proven "validation helper returns ok/error" but not "propagation to block-level/live path".',
              '',
              'PHANTOM-DESYNC: theorem name in PR body/registry does not match actual theorem name in code; matrix references a theorem that does not exist in final diff.',
              '',
              'WRAPPER-INFLATION: theorem is just projection of already-proven conjunction; specialization "passed X got X"; trivial corollary/alias presented as new coverage; constant via rfl presented as substantive progress.',
              '',
              'UNUSED-PREMISE: hypothesis not used in proof body; standalone premise (i ≠ j, hNe, hBound, hNonEmpty) that should be derived from structure/invariant, not passed externally.',
              '',
              'SAFE-SUBSET-AS-UNIVERSAL: only whitelist/safe-subset branch proven; other substantial branches not closed; but row/claim says FULL/universal.',
              '',
              'BOUNDARY-GAP: missing zero case, empty list, single element, limit bound, error propagation case, or other natural edge of requirement.',
              '',
              'AXIOM-ASSUMED: new axiom; "structural correspondence" without proof; "by assumption"/"temporary bridge"/"obvious equivalence" without theorem.',
              '',
              'SORRY-ADMIT: sorry or admit anywhere in proof body of changed files.',
              '</red-flags>',
              '',
              '<theorem-classification>',
              'For each theorem, classify as exactly one:',
              '- LIVE: theorem on real live function/path',
              '- BRIDGE: theorem connecting helper/model/representation to live semantics',
              '- MODEL: theorem only on helper/model level',
              '- WRAPPER: alias, projection, trivial corollary, tautology',
              '',
              'Rules:',
              '- FULL coverage requires LIVE or LIVE+BRIDGE only.',
              '- MODEL without bridge does NOT close a requirement.',
              '- WRAPPER is NOT substantive progress.',
              '</theorem-classification>',
              '',
              '<review-process>',
              'For each claim/requirement in the PR, answer internally:',
              '1. Which exact theorem supposedly covers it?',
              '2. On which exact function/def is the theorem proven?',
              '3. Is it LIVE, BRIDGE, MODEL, or WRAPPER?',
              '4. If MODEL — where is the bridge to live?',
              '5. If BRIDGE — does it actually close the semantic gap?',
              '6. Are all hypotheses used?',
              '7. Is the statement weaker than what the name/PR text promises?',
              '8. Is any boundary case missing?',
              '9. Is there registry/matrix drift?',
              '10. Can status honestly remain FULL? If not — downgrade to PARTIAL or FAIL.',
              '</review-process>',
              '',
              '<hard-rules>',
              '- Do NOT soften findings. If it is a gap, call it a gap.',
              '- Do NOT treat "non-blocking smell" as safe by default.',
              '- If a theorem can be restated weaker and still hold — check if the current name overclaims.',
              '- If PR body is more cautious than theorem names — check theorem names.',
              '- If theorem names are more cautious than PR body — check PR body.',
              '- Check FINAL diff only, not earlier patch snapshots.',
              '- If in doubt between FULL and PARTIAL — assign PARTIAL.',
              '- If you find even one: axiom, phantom theorem, helper/live mismatch without bridge, or major overclaim → verdict must be BLOCK.',
              '- If no real defects found — return EMPTY findings array. Do NOT fabricate findings.',
              '- Every finding MUST reference a line in a current changed file. If you cannot cite an exact line — do not add the finding.',
              '- Do NOT report: improvements (axiom→theorem, sorry removal), style issues, suggestions, refactoring ideas.',
              '- Do NOT report a theorem name that does not exist in current file content.',
              '- Do NOT duplicate the same issue across multiple findings.',
              '- ANTI-HALLUCINATION: If the diff is truncated or you cannot see a file/function mentioned',
              '  elsewhere in the diff — do NOT claim it is missing. Flag as unreviewed, not missing.',
              '- NEVER report "function not defined" or "theorem missing" unless you have verified the',
              '  COMPLETE file content provided. If content is truncated, assume unseen code exists.',
              '- You receive BOTH diff AND changed file content (truncated to 8k chars/file, 64k total).',
              '  Use provided content to verify definitions and imports, but if content appears truncated,',
              '  do NOT claim definitions are absent — flag the file as partially reviewed instead.',
              '</hard-rules>',
              '',
              '<output-format>',
              'Respond with valid JSON only. No text outside JSON.',
              'Structure: {"model":"","verdict":"BLOCK|ALLOW","findings":[{"severity":"CRITICAL|HIGH|MEDIUM|LOW","file":"","line":0,"category":"OVERCLAIM|HELPER_NO_BRIDGE|PREDICATE_NOT_EFFECT|PHANTOM|WRAPPER_INFLATION|UNUSED_PREMISE|SAFE_SUBSET|BOUNDARY_GAP|AXIOM|SORRY|OTHER","theorem_class":"LIVE|BRIDGE|MODEL|WRAPPER|N/A","title":"","details":"","suggestion":""}],"overclaims":[],"summary":""}',
              '',
              'SEVERITY RULES:',
              '- CRITICAL: sorry/admit in proof; theorem contradicts spec semantics; unsound proof. Only at 100% certainty.',
              '- HIGH: vacuous/tautological theorem; major overclaim (claims behavioral, proves alias); MODEL without bridge marked FULL; phantom theorem in registry.',
              '- MEDIUM: missing boundary case; predicate-level without state-effect; partial branch coverage claimed as full.',
              '- LOW: unused premise; minor wrapper inflation honestly labeled.',
              '',
              'If zero defects: {"model":"deepseek/DeepSeek-R1-0528","verdict":"ALLOW","findings":[],"overclaims":[],"summary":"No defects found in changed Lean files."}',
              '</output-format>'
            ].join('\n');
            const stripOuterCodeFence = (text) => {
              let cleaned = typeof text === 'string' ? text : '';
              cleaned = cleaned.replace(/<think>[\s\S]*?<\/think>\s*/g, '');
              cleaned = cleaned.replace(/^\s*```(?:json)?\s*\n?/, '').replace(/\n?\s*```\s*$/, '').trim();
              return cleaned;
            };
            const parseReviewPayload = (raw) => {
              const normalized = stripOuterCodeFence(raw);
              if (!normalized) {
                return { parsed: null, candidate: normalized, normalized, error: new Error('empty model output') };
              }
              try {
                return { parsed: JSON.parse(normalized), candidate: normalized, normalized };
              } catch (err) {
                return { parsed: null, candidate: normalized, normalized, error: err };
              }
            };
            const modelId = 'deepseek/DeepSeek-R1-0528';
            const reviewMessages = [
              { role: 'system', content: systemPrompt },
              {
                role: 'user',
                content: [
                  `PR title:\n${prTitle}`,
                  `PR body:\n${prBody}`,
                  `Changed Lean files:\n${changedLeanFiles.join('\n')}`,
                  `Current changed Lean file contents:\n\n${changedFilePayload}`,
                  `PR diff:\n\n${diff}`
                ].join('\n\n')
              }
            ];
            const callModel = async (useJsonMode) => {
              const payload = {
                model: modelId,
                messages: reviewMessages,
                temperature: 0.6,
                top_p: 0.95
              };
              if (useJsonMode) {
                payload.response_format = { type: 'json_object' };
              }
              const response = await fetch(
                'https://models.github.ai/inference/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify(payload)
                }
              );
              if (!response.ok) {
                const body = await response.text();
                return {
                  ok: false,
                  status: response.status,
                  body
                };
              }
              const data = await response.json();
              return {
                ok: true,
                content: data?.choices?.[0]?.message?.content ?? ''
              };
            };
            let result = null;
            try {
              core.info(`Trying model: ${modelId} with JSON mode`);
              let attempt = await callModel(true);
              if (!attempt.ok) {
                core.warning(`JSON mode request failed for ${modelId}: ${attempt.status}: ${(attempt.body || '').slice(0, 200)}`);
                core.info(`Retrying model: ${modelId} without JSON mode`);
                attempt = await callModel(false);
              }
              if (!attempt.ok) {
                throw new Error(`Security review model ${modelId} returned ${attempt.status}: ${(attempt.body || '').slice(0, 200)}`);
              } else {
                result = attempt.content;
              }
            } catch (err) {
              throw new Error(`Security review failed before validated findings were produced: ${err.message}`);
            }
            if (typeof result === 'string' && result.trim() !== '') {
              fs.writeFileSync(rawOutputPath, result, 'utf8');
            }
            const parsedResult = parseReviewPayload(result);
            let parsed = parsedResult.parsed;
            if (!parsed) {
              const preview = (parsedResult.normalized || String(result || ''))
                .replace(/\s+/g, ' ')
                .slice(0, 180);
              throw new Error(`Security review produced invalid JSON from ${modelId}: ${parsedResult.error?.message || 'unknown parse error'}; preview=${preview}`);
            }
            const changedSet = new Set(changedLeanFiles);
            const fileContents = new Map(
              changedLeanFiles.map((file) => [file, readChangedLeanFile(file)])
            );
            const lineCounts = new Map(
              changedLeanFiles.map((file) => [file, fileContents.get(file).split('\n').length])
            );
            const theoremRefsInText = (text) => {
              const out = new Set();
              const re = /`([A-Za-z0-9_.']+)`/g;
              let m;
              while ((m = re.exec(text || '')) !== null) {
                out.add(m[1]);
              }
              return [...out];
            };
            const normalizedFindings = Array.isArray(parsed.findings) ? parsed.findings : [];
            const filtered = [];
            const seen = new Set();
            for (const f of normalizedFindings) {
              if (!f || typeof f !== 'object') continue;
              if (!changedSet.has(f.file)) continue;
              if (!Number.isInteger(f.line) || f.line <= 0) continue;
              const maxLine = lineCounts.get(f.file) || 0;
              if (f.line > maxLine) continue;
              const content = fileContents.get(f.file) || '';
              const refs = theoremRefsInText(`${f.title || ''}\n${f.details || ''}`);
            // Skip phantom-ref filter for categories that report MISSING things
              const absenceCats = new Set(['OVERCLAIM','PHANTOM','BOUNDARY_GAP','PHANTOM_DESYNC']);
              const cat = (f.category || '').toUpperCase();
              if (refs.length > 0 && !absenceCats.has(cat)) {
                const allMissing = refs.every((name) => !content.includes(name));
                if (allMissing) continue;
              }
              const key = `${f.file}:${f.line}:${cat}`;
              if (seen.has(key)) continue;
              seen.add(key);
              filtered.push(f);
            }
            parsed.findings = filtered;
            if (parsed.degraded === true) {
              parsed.summary = 'Security review degraded: model output was not valid JSON, so no validated findings were emitted. See raw artifact / workflow warning for details.';
            } else if (filtered.length === 0) {
              parsed.summary = 'No validated findings after stale/dup filtering.';
            } else if (typeof parsed.summary !== 'string' || parsed.summary.trim() === '') {
              parsed.summary = `Filtered findings: ${filtered.length}.`;
            }
            core.setOutput('review', JSON.stringify(parsed, null, 2));
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload raw review output artifact
        if: always() && hashFiles('deepseek-raw-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: deepseek-raw-review-output
          path: deepseek-raw-output.txt
          retention-days: 7
      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            let verdict = 'UNKNOWN';
            try { verdict = JSON.parse(review).verdict || 'UNKNOWN'; } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### \uD83D\uDD12 Hostile Formal Review: DeepSeek-R1-0528\n_Model: deepseek/DeepSeek-R1-0528_\n_Verdict: ${verdict}_\n\n\`\`\`json\n${review}\n\`\`\``
            });
      - name: Hard block on sorry/admit in Lean files
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8');
            const isLeanDiffSection = (section) => {
              const header = section.split('\n', 1)[0] ?? '';
              return header.includes('.lean');
            };
            const startsLeanCharLiteral = (line, idx) => {
              const prev = idx > 0 ? line[idx - 1] : '';
              if (/[A-Za-z0-9_]/.test(prev)) {
                return false;
              }
              const next = line[idx + 1];
              if (next === undefined || next === ' ' || next === '\t') {
                return false;
              }
              let endIdx = idx + 1;
              if (line[endIdx] === '\\') {
                endIdx += 2;
              } else {
                endIdx += 1;
              }
              return line[endIdx] === "'";
            };
            const stripLeanLineComment = (line) => {
              let inString = false;
              let inChar = false;
              let escaped = false;
              for (let i = 0; i < line.length; i += 1) {
                const ch = line[i];
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (inString) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }
                if (inChar) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === "'") {
                    inChar = false;
                  }
                  continue;
                }
                if (ch === '"') {
                  inString = true;
                  continue;
                }
                if (ch === "'" && startsLeanCharLiteral(line, i)) {
                  inChar = true;
                  continue;
                }
                if (ch === '-' && line[i + 1] === '-') {
                  return line.slice(0, i);
                }
              }
              return line;
            };
            // Split diff into per-file sections, only check true .lean file sections
            const sections = diff.split(/^diff --git /m).filter(isLeanDiffSection);
            const sorryLines = [];
            for (const section of sections) {
              const lines = section.split('\n');
              for (const line of lines) {
                if (!line.startsWith('+') || line.startsWith('+++')) continue;
                const stripped = stripLeanLineComment(line);
                if (/\bsorry\b/.test(stripped) || /\badmit\b/.test(stripped)) {
                  sorryLines.push(line);
                }
              }
            }
            if (sorryLines.length > 0) {
              core.setFailed(`Merge blocked: sorry/admit in .lean files:\n${sorryLines.join('\n')}`);
            } else {
              core.info('No sorry/admit in .lean added lines — passed');
            }
