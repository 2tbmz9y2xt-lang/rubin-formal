name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Download diff artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: pr-diff
      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 12000);
            const systemPrompt = [
              'Ты — ревьюер безопасности формальных доказательств Lean 4 для протокола RUBIN.',
              'Контекст: Lean 4 v4.6.0 + std4 (без Mathlib). Спека RUBIN_L1_CANONICAL.md → Go → Rust → conformance → Lean. Криптография: ML-DSA-87.',
              '',
              'ЗАДАЧА: найти РЕАЛЬНЫЕ ДЕФЕКТЫ в доказательствах. Только баги которые делают доказательства НЕВЕРНЫМИ.',
              '',
              'CRITICAL (блокирует мерж — ТОЛЬКО при 100% уверенности что код unsound):',
              '  (1) sorry или admit в доказательстве',
              '  (2) формулировка теоремы противоречит семантике спеки',
              '  (3) native_decide заменён на trivial/rfl для нетривиального свойства',
              '  (4) несогласованность юниверсов замаскированная sorry',
              '  Если есть хоть 1% сомнения — это НЕ CRITICAL.',
              '',
              'HIGH: доказательство проходит но доказывает более слабое свойство чем спека.',
              'MEDIUM: пропущенные edge cases, ошибки conformance vectors.',
              'LOW: прочие реальные дефекты.',
              '',
              'ЗАПРЕЩЕНО включать в findings:',
              '  - Улучшения (axiom→theorem, добавление доказательств, удаление sorry)',
              '  - Предложения: doc-комментарии, human review, тесты, рефакторинг',
              '  - Стиль: именование, import, private/public, unused параметры',
              '  - Всё что НЕ является дефектом в коде',
              '',
              'Если дефектов нет — верни ПУСТОЙ массив findings. Пустой = хорошо. НЕ выдумывай находки.',
              'Проверяй ТОЛЬКО diff. НЕ выдумывай файлы или поведение вне diff.',
              'JSON: {"model":"","findings":[{"severity":"...","file":"","line":0,"title":"","details":"","suggestion":""}],"summary":""}'
            ].join('\n');
            const modelId = 'deepseek/DeepSeek-V3-0324';
            let result = null;
            try {
              core.info(`Trying model: ${modelId}`);
              const response = await fetch(
                'https://models.github.ai/inference/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: modelId,
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user', content: `Review this PR diff:\n\n${diff}` }
                    ],
                    temperature: 0.2
                  })
                }
              );
              if (!response.ok) {
                const body = await response.text();
                core.setFailed(`Security review fail-closed: model ${modelId} returned ${response.status}: ${body.slice(0, 200)}`);
                return;
              }
              const data = await response.json();
              result = data.choices[0].message.content;
            } catch (err) {
              core.setFailed(`Security review fail-closed: model ${modelId} error: ${err.message}`);
              return;
            }
            result = result.replace(/^\s*```(?:json)?\s*\n?/, '').replace(/\n?\s*```\s*$/, '').trim();
            core.setOutput('review', result);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Security Review: deepseek-v3\n_Model: deepseek/DeepSeek-V3-0324_\n\n\`\`\`json\n${review}\n\`\`\``
            });
      - name: Hard block on sorry/admit in Lean files
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8');
            const isLeanDiffSection = (section) => {
              const header = section.split('\n', 1)[0] ?? '';
              return header.includes('.lean');
            };
            const startsLeanCharLiteral = (line, idx) => {
              const prev = idx > 0 ? line[idx - 1] : '';
              if (/[A-Za-z0-9_]/.test(prev)) {
                return false;
              }
              const next = line[idx + 1];
              if (next === undefined || next === ' ' || next === '\t') {
                return false;
              }
              let endIdx = idx + 1;
              if (line[endIdx] === '\\') {
                endIdx += 2;
              } else {
                endIdx += 1;
              }
              return line[endIdx] === "'";
            };
            const stripLeanLineComment = (line) => {
              let inString = false;
              let inChar = false;
              let escaped = false;
              for (let i = 0; i < line.length; i += 1) {
                const ch = line[i];
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (inString) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }
                if (inChar) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === "'") {
                    inChar = false;
                  }
                  continue;
                }
                if (ch === '"') {
                  inString = true;
                  continue;
                }
                if (ch === "'" && startsLeanCharLiteral(line, i)) {
                  inChar = true;
                  continue;
                }
                if (ch === '-' && line[i + 1] === '-') {
                  return line.slice(0, i);
                }
              }
              return line;
            };
            // Split diff into per-file sections, only check true .lean file sections
            const sections = diff.split(/^diff --git /m).filter(isLeanDiffSection);
            const sorryLines = [];
            for (const section of sections) {
              const lines = section.split('\n');
              for (const line of lines) {
                if (!line.startsWith('+') || line.startsWith('+++')) continue;
                const stripped = stripLeanLineComment(line);
                if (/\bsorry\b/.test(stripped) || /\badmit\b/.test(stripped)) {
                  sorryLines.push(line);
                }
              }
            }
            if (sorryLines.length > 0) {
              core.setFailed(`Merge blocked: sorry/admit in .lean files:\n${sorryLines.join('\n')}`);
            } else {
              core.info('No sorry/admit in .lean added lines — passed');
            }
