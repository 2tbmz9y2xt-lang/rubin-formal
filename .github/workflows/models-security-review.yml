name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Download diff artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: pr-diff
      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 12000);
            const systemPrompt = [
              'You are the main formal verification security reviewer for the RUBIN protocol. Context:',
              '- Lean 4 v4.6.0 with std4 (no Mathlib) formal verification of consensus rules',
              '- Canonical spec: RUBIN_L1_CANONICAL.md -> Go reference client -> Rust parity client -> conformance vectors -> formal proofs',
              '- Proof files: RubinFormal/ -- block validation, UTXO, merkle, witness commitment, sighash, covenants',
              '- Conformance replay: native_decide for all gates (NOT #eval + trivial)',
              '- Refinement bridge: Go traces -> GoTraceV1.lean -> Lean replay',
              '- Cryptography: ML-DSA-87 (native signature scheme)',
              'Review the diff for formal verification security issues, ordered by severity:',
              'CRITICAL: sorry or admit in any proof, theorem statement not matching spec semantics, native_decide replaced with trivial, universe inconsistencies masked by sorry, security-critical invariants weakened or removed',
              'HIGH: missing edge cases in theorem coverage, proof succeeding but proving weaker property, ByteArray/BEq proofs using simp without Array.isEqv bridge, conformance vector filtering errors',
              'MEDIUM: proof style issues, missing doc comments on public theorems, unused lemmas, #eval blocks that should be native_decide theorems',
              'LOW: naming convention drift from thm_<spec_section> pattern, import organization, proof coverage gaps',
              'PERF: tactic explosions, slow native_decide on large vectors, unnecessary computation in proofs',
              'Rules:',
              '- Review only what is visible in the provided diff bundle.',
              '- Do not invent files, lines, or behavior not evidenced by the diff.',
              '- If no findings, return empty findings array and explain why in summary.',
              '- Output valid JSON: {"model":"","findings":[{"severity":"...","file":"","line":0,"title":"","details":"","suggestion":""}],"summary":""}',
            ].join('\n');
            const modelId = 'deepseek/DeepSeek-V3-0324';
            let result = null;
            try {
              core.info(`Trying model: ${modelId}`);
              const response = await fetch(
                'https://models.github.ai/inference/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: modelId,
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user', content: `Review this PR diff:\n\n${diff}` }
                    ],
                    temperature: 0.2
                  })
                }
              );
              if (!response.ok) {
                const body = await response.text();
                core.setFailed(`Security review fail-closed: model ${modelId} returned ${response.status}: ${body.slice(0, 200)}`);
                return;
              }
              const data = await response.json();
              result = data.choices[0].message.content;
            } catch (err) {
              core.setFailed(`Security review fail-closed: model ${modelId} error: ${err.message}`);
              return;
            }
            result = result.replace(/^\s*```(?:json)?\s*\n?/, '').replace(/\n?\s*```\s*$/, '').trim();
            core.setOutput('review', result);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Security Review: deepseek-v3\n_Model: deepseek/DeepSeek-V3-0324_\n\n\`\`\`json\n${review}\n\`\`\``
            });

      - name: Block on critical findings
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            let parsed;
            try {
              parsed = JSON.parse(review);
            } catch (e) {
              core.setFailed(`Security review fail-closed: unparseable review JSON: ${e.message}`);
              return;
            }
            const critical = (parsed.findings || []).filter(f => f.severity === 'CRITICAL');
            if (critical.length > 0) {
              core.setFailed(`Merge blocked: ${critical.length} CRITICAL finding(s)`);
            } else {
              core.info('No CRITICAL findings - review passed');
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
