name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Download diff artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: pr-diff
      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const rawOutputPath = 'deepseek-raw-output.txt';
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 12000);
            const prTitle = context.payload.pull_request?.title ?? '';
            const prBody = (context.payload.pull_request?.body ?? '').slice(0, 4000);
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            const headSha = '${{ github.event.pull_request.head.sha }}';
            const changedLeanFiles = execSync(
              `git diff --diff-filter=ACMR --name-only ${baseSha} ${headSha} -- '*.lean'`,
              { maxBuffer: 20 * 1024 * 1024 }
            )
              .toString()
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);
            const changedFilePayload = changedLeanFiles
              .map((file) => {
                const content = fs.readFileSync(file, 'utf8').slice(0, 5000);
                return `FILE: ${file}\n${content}`;
              })
              .join('\n\n---\n\n')
              .slice(0, 18000);
            const systemPrompt = [
              'Ты — ревьюер безопасности формальных доказательств Lean 4 для протокола RUBIN.',
              'Контекст: Lean 4 v4.6.0 + std4 (без Mathlib). Спека RUBIN_L1_CANONICAL.md → Go → Rust → conformance → Lean. Криптография: ML-DSA-87.',
              '',
              'РЕЖИМ: FAIL-CLOSED. Ищи только реальные дефекты в ТЕКУЩЕМ diff и текущих изменённых Lean файлах.',
              'Сравнивай не только proof body, но и PR title/body/docstring theorem against actual proposition.',
              'ГЛАВНЫЙ ПРИОРИТЕТ: МИНИМУМ FALSE POSITIVES. Лучше пропустить сомнительный finding, чем оставить шумный.',
              '',
              'ЗАДАЧА: найти РЕАЛЬНЫЕ ДЕФЕКТЫ в formal PR. Не только unsound proofs, но и VACUOUS / OVERCLAIMED proofs, где заявлен behavioral/exhaustive/determinism/closure result, а theorem surface слабее.',
              '',
              'CRITICAL (блокирует мерж — ТОЛЬКО при 100% уверенности что код unsound):',
              '  (1) sorry или admit в доказательстве',
              '  (2) формулировка теоремы противоречит семантике спеки',
              '  (3) native_decide заменён на trivial/rfl для нетривиального свойства',
              '  (4) несогласованность юниверсов замаскированная sorry',
              '  (5) theorem/module не может typecheck/import graph ломается из-за diff',
              '  Если есть хоть 1% сомнения — это НЕ CRITICAL.',
              '',
              'HIGH:',
              '  - theorem vacuous / tautological: f x = f x, ∃ y, f x = y, True := trivial, premise returned unchanged',
              '  - theorem claims behavioral/determinism/domain-separation/exhaustive/closure, but proof only shows helper lemma / constant equality / one concrete reject / all-fail branch',
              '  - PR title/body or theorem docstring overclaims what proposition actually proves',
              '  - proof can never catch regression in the named behavior',
              '',
              'MEDIUM:',
              '  - exhaustive/distinctness theorem omits live cases/constants/branches present in the referenced module',
              '  - theorem only covers error path while claim needs successful path, or vice versa',
              '  - proof is materially narrower than lane/section claim but still locally meaningful',
              '',
              'LOW:',
              '  - minor honest theorem quality issues that do not create overclaim by themselves',
              '',
              'ЗАПРЕЩЕНО включать в findings:',
              '  - Улучшения (axiom→theorem, добавление доказательств, удаление sorry)',
              '  - Предложения: doc-комментарии, human review, тесты, рефакторинг',
              '  - Стиль: именование, import, private/public, unused параметры',
              '  - Всё что НЕ является дефектом в коде',
              '',
              'ОСОБЫЕ ПРАВИЛА ДЛЯ FORMAL PR:',
              '  - Если theorem intentionally narrow и PR/body/docstring честно говорят что theorem narrow/concrete/example-only, НЕ репорть это как баг.',
              '  - Если theorem helper-level, а PR claims section closure / behavioral proof / exhaustive registry / replay-domain separation / determinism, это finding.',
              '  - Проверяй текущий file content, а не старые версии PR. Не репорть удалённые theorem names.',
              '  - Не дублируй одну и ту же мысль несколькими findings.',
              '  - Не репорть "можно доказать сильнее" как дефект, если текущий theorem честно заявлен как concrete/example-only.',
              '  - Не репорть missing branch/case, если этот branch вообще не входит в текущую proposition.',
              '  - Не заявляй противоречие с implementation/spec без конкретного терма или редуцированного current-code counterexample из предоставленного контекста.',
              '  - Не репорть theorem name, которого нет в текущем file content.',
              '  - Для HIGH/CRITICAL ты должен видеть в текущем файле один из паттернов: tautology, stale overclaim, omitted live case, wrong compared inputs, or direct contradiction.',
              '',
              'Если дефектов нет — верни ПУСТОЙ массив findings. Пустой = хорошо. НЕ выдумывай находки.',
              'Проверяй ТОЛЬКО provided PR title/body + diff + current contents of changed Lean files. НЕ выдумывай файлы или поведение вне этого контекста.',
              'Каждый finding должен ссылаться на строку в текущем changed file. Если точную строку назвать нельзя — не добавляй finding.',
              'JSON: {"model":"","findings":[{"severity":"...","file":"","line":0,"title":"","details":"","suggestion":""}],"summary":""}'
            ].join('\n');
            const stripOuterCodeFence = (text) => (
              typeof text === 'string'
                ? text.replace(/^\s*```(?:json)?\s*\n?/, '').replace(/\n?\s*```\s*$/, '').trim()
                : ''
            );
            const extractFirstJSONObject = (text) => {
              if (typeof text !== 'string') return null;
              let start = -1;
              let depth = 0;
              let inString = false;
              let escaped = false;
              for (let i = 0; i < text.length; i += 1) {
                const ch = text[i];
                if (inString) {
                  if (escaped) {
                    escaped = false;
                  } else if (ch === '\\\\') {
                    escaped = true;
                  } else if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }
                if (ch === '"') {
                  inString = true;
                  continue;
                }
                if (ch === '{') {
                  if (depth === 0) start = i;
                  depth += 1;
                  continue;
                }
                if (ch === '}' && depth > 0) {
                  depth -= 1;
                  if (depth === 0 && start >= 0) {
                    return text.slice(start, i + 1);
                  }
                }
              }
              return null;
            };
            const parseReviewPayload = (raw) => {
              const normalized = stripOuterCodeFence(raw);
              const candidates = [];
              if (normalized) candidates.push(normalized);
              const embedded = extractFirstJSONObject(normalized);
              if (embedded && !candidates.includes(embedded)) candidates.push(embedded);
              let lastErr = null;
              for (const candidate of candidates) {
                try {
                  return { parsed: JSON.parse(candidate), candidate, normalized };
                } catch (err) {
                  lastErr = err;
                }
              }
              return { parsed: null, candidate: normalized, normalized, error: lastErr };
            };
            const modelId = 'deepseek/DeepSeek-V3-0324';
            const reviewMessages = [
              { role: 'system', content: systemPrompt },
              {
                role: 'user',
                content: [
                  `PR title:\n${prTitle}`,
                  `PR body:\n${prBody}`,
                  `Changed Lean files:\n${changedLeanFiles.join('\n')}`,
                  `Current changed Lean file contents:\n\n${changedFilePayload}`,
                  `PR diff:\n\n${diff}`
                ].join('\n\n')
              }
            ];
            const callModel = async (useJsonMode) => {
              const payload = {
                model: modelId,
                messages: reviewMessages,
                temperature: 0
              };
              if (useJsonMode) {
                payload.response_format = { type: 'json_object' };
              }
              const response = await fetch(
                'https://models.github.ai/inference/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify(payload)
                }
              );
              if (!response.ok) {
                const body = await response.text();
                return {
                  ok: false,
                  status: response.status,
                  body
                };
              }
              const data = await response.json();
              return {
                ok: true,
                content: data?.choices?.[0]?.message?.content ?? ''
              };
            };
            let result = null;
            try {
              core.info(`Trying model: ${modelId} with JSON mode`);
              let attempt = await callModel(true);
              if (!attempt.ok) {
                core.warning(`JSON mode request failed for ${modelId}: ${attempt.status}: ${(attempt.body || '').slice(0, 200)}`);
                core.info(`Retrying model: ${modelId} without JSON mode`);
                attempt = await callModel(false);
              }
              if (!attempt.ok) {
                throw new Error(`Security review model ${modelId} returned ${attempt.status}: ${(attempt.body || '').slice(0, 200)}`);
              } else {
                result = attempt.content;
              }
            } catch (err) {
              throw new Error(`Security review failed before validated findings were produced: ${err.message}`);
            }
            if (typeof result === 'string' && result.trim() !== '') {
              fs.writeFileSync(rawOutputPath, result, 'utf8');
            }
            const parsedResult = parseReviewPayload(result);
            let parsed = parsedResult.parsed;
            if (!parsed) {
              const preview = (parsedResult.normalized || String(result || ''))
                .replace(/\s+/g, ' ')
                .slice(0, 180);
              throw new Error(`Security review produced invalid JSON from ${modelId}: ${parsedResult.error?.message || 'unknown parse error'}; preview=${preview}`);
            }

            const changedSet = new Set(changedLeanFiles);
            const fileContents = new Map(
              changedLeanFiles.map((file) => [file, fs.readFileSync(file, 'utf8')])
            );
            const lineCounts = new Map(
              changedLeanFiles.map((file) => [file, fileContents.get(file).split('\n').length])
            );
            const theoremRefsInText = (text) => {
              const out = new Set();
              const re = /`([A-Za-z0-9_.']+)`/g;
              let m;
              while ((m = re.exec(text || '')) !== null) {
                out.add(m[1]);
              }
              return [...out];
            };

            const normalizedFindings = Array.isArray(parsed.findings) ? parsed.findings : [];
            const filtered = [];
            const seen = new Set();

            for (const f of normalizedFindings) {
              if (!f || typeof f !== 'object') continue;
              if (!changedSet.has(f.file)) continue;
              if (!Number.isInteger(f.line) || f.line <= 0) continue;
              const maxLine = lineCounts.get(f.file) || 0;
              if (f.line > maxLine) continue;

              const content = fileContents.get(f.file) || '';
              const refs = theoremRefsInText(`${f.title || ''}\n${f.details || ''}`);
              if (refs.length > 0) {
                const allMissing = refs.every((name) => !content.includes(name));
                if (allMissing) continue;
              }

              const key = `${f.file}:${f.line}:${(f.title || '').trim().toLowerCase()}`;
              if (seen.has(key)) continue;
              seen.add(key);
              filtered.push(f);
            }

            parsed.findings = filtered;
            if (parsed.degraded === true) {
              parsed.summary = 'Security review degraded: model output was not valid JSON, so no validated findings were emitted. See raw artifact / workflow warning for details.';
            } else if (filtered.length === 0) {
              parsed.summary = 'No validated findings after stale/dup filtering.';
            } else if (typeof parsed.summary !== 'string' || parsed.summary.trim() === '') {
              parsed.summary = `Filtered findings: ${filtered.length}.`;
            }
            core.setOutput('review', JSON.stringify(parsed, null, 2));
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload raw review output artifact
        if: always() && hashFiles('deepseek-raw-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: deepseek-raw-review-output
          path: deepseek-raw-output.txt
          retention-days: 7

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Security Review: deepseek-v3\n_Model: deepseek/DeepSeek-V3-0324_\n\n\`\`\`json\n${review}\n\`\`\``
            });
      - name: Hard block on sorry/admit in Lean files
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8');
            const isLeanDiffSection = (section) => {
              const header = section.split('\n', 1)[0] ?? '';
              return header.includes('.lean');
            };
            const startsLeanCharLiteral = (line, idx) => {
              const prev = idx > 0 ? line[idx - 1] : '';
              if (/[A-Za-z0-9_]/.test(prev)) {
                return false;
              }
              const next = line[idx + 1];
              if (next === undefined || next === ' ' || next === '\t') {
                return false;
              }
              let endIdx = idx + 1;
              if (line[endIdx] === '\\') {
                endIdx += 2;
              } else {
                endIdx += 1;
              }
              return line[endIdx] === "'";
            };
            const stripLeanLineComment = (line) => {
              let inString = false;
              let inChar = false;
              let escaped = false;
              for (let i = 0; i < line.length; i += 1) {
                const ch = line[i];
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (inString) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }
                if (inChar) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === "'") {
                    inChar = false;
                  }
                  continue;
                }
                if (ch === '"') {
                  inString = true;
                  continue;
                }
                if (ch === "'" && startsLeanCharLiteral(line, i)) {
                  inChar = true;
                  continue;
                }
                if (ch === '-' && line[i + 1] === '-') {
                  return line.slice(0, i);
                }
              }
              return line;
            };
            // Split diff into per-file sections, only check true .lean file sections
            const sections = diff.split(/^diff --git /m).filter(isLeanDiffSection);
            const sorryLines = [];
            for (const section of sections) {
              const lines = section.split('\n');
              for (const line of lines) {
                if (!line.startsWith('+') || line.startsWith('+++')) continue;
                const stripped = stripLeanLineComment(line);
                if (/\bsorry\b/.test(stripped) || /\badmit\b/.test(stripped)) {
                  sorryLines.push(line);
                }
              }
            }
            if (sorryLines.length > 0) {
              core.setFailed(`Merge blocked: sorry/admit in .lean files:\n${sorryLines.join('\n')}`);
            } else {
              core.info('No sorry/admit in .lean added lines — passed');
            }
