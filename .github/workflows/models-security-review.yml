name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'
      - 'proof_coverage.json'
      - 'refinement_bridge.json'
      - 'tools/check_formal_registry_truth.py'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Download diff artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: pr-diff
      - name: Install jsonrepair in isolated directory
        run: |
          set -euo pipefail
          mkdir -p "$JSONREPAIR_DIR"
          cd "$JSONREPAIR_DIR"
          npm init -y >/dev/null 2>&1
          npm install --ignore-scripts --no-audit --no-fund --registry=https://registry.npmjs.org/ jsonrepair@3.12.0
        env:
          JSONREPAIR_DIR: ${{ runner.temp }}/jsonrepair
      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          JSONREPAIR_DIR: ${{ runner.temp }}/jsonrepair
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const run = require('./.github/scripts/security-review.js');
            await run({github, context, core});
      - name: Upload raw review output artifact
        if: always() && hashFiles('deepseek-raw-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: deepseek-raw-review-output
          path: deepseek-raw-output.txt
          retention-days: 7
      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            let verdict = 'UNKNOWN';
            try { verdict = JSON.parse(review).verdict || 'UNKNOWN'; } catch(e) {}
            const marker = '### \uD83D\uDD12 Hostile Formal Review: DeepSeek-R1-0528';
            const body = `${marker}\n_Model: deepseek/DeepSeek-R1-0528_\n_Verdict: ${verdict}_\n\n\`\`\`json\n${review}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Hard block on sorry/admit in Lean files
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8');
            const isLeanDiffSection = (section) => {
              const header = section.split('\n', 1)[0] ?? '';
              return header.includes('.lean');
            };
            const startsLeanCharLiteral = (line, idx) => {
              const prev = idx > 0 ? line[idx - 1] : '';
              if (/[A-Za-z0-9_]/.test(prev)) {
                return false;
              }
              const next = line[idx + 1];
              if (next === undefined || next === ' ' || next === '\t') {
                return false;
              }
              let endIdx = idx + 1;
              if (line[endIdx] === '\\') {
                endIdx += 2;
              } else {
                endIdx += 1;
              }
              return line[endIdx] === "'";
            };
            const stripLeanLineComment = (line) => {
              let inString = false;
              let inChar = false;
              let escaped = false;
              for (let i = 0; i < line.length; i += 1) {
                const ch = line[i];
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (inString) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }
                if (inChar) {
                  if (ch === '\\') {
                    escaped = true;
                    continue;
                  }
                  if (ch === "'") {
                    inChar = false;
                  }
                  continue;
                }
                if (ch === '"') {
                  inString = true;
                  continue;
                }
                if (ch === "'" && startsLeanCharLiteral(line, i)) {
                  inChar = true;
                  continue;
                }
                if (ch === '-' && line[i + 1] === '-') {
                  return line.slice(0, i);
                }
              }
              return line;
            };
            const sections = diff.split(/^diff --git /m).filter(isLeanDiffSection);
            const sorryLines = [];
            for (const section of sections) {
              const lines = section.split('\n');
              for (const line of lines) {
                if (!line.startsWith('+') || line.startsWith('+++')) continue;
                const stripped = stripLeanLineComment(line);
                if (/\bsorry\b/.test(stripped) || /\badmit\b/.test(stripped)) {
                  sorryLines.push(line);
                }
              }
            }
            if (sorryLines.length > 0) {
              core.setFailed(`Merge blocked: sorry/admit in .lean files:\n${sorryLines.join('\n')}`);
            } else {
              core.info('No sorry/admit in .lean added lines — passed');
            }
