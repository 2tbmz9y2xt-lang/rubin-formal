name: "Multi-Model Lean Proof Review (GitHub Models)"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      diff: ${{ steps.diff.outputs.diff }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.lean' | head -c 80000)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT

  review-gpt41:
    needs: get-diff
    if: needs.get-diff.outputs.diff != ''
    runs-on: ubuntu-latest
    outputs:
      comment: ${{ steps.review.outputs.comment }}
    steps:
      - name: GPT-4.1 Lean Proof Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(jq -n \
            --arg diff "${{ needs.get-diff.outputs.diff }}" \
            '{
              model: "openai/gpt-4.1",
              messages: [
                {
                  role: "system",
                  content: "You are a formal verification expert specializing in Lean4 and the RUBIN blockchain protocol. Review Lean proof changes for: 1) Correctness of proofs and theorems 2) Missing sorry or admit placeholders 3) Soundness of axioms and assumptions 4) Consistency with RUBIN protocol specification 5) Completeness of formalization. Output structured markdown with severity (CRITICAL/HIGH/MEDIUM/LOW/INFO)."
                },
                {
                  role: "user",
                  content: ("Review this Lean proof diff:\n\n" + $diff)
                }
              ],
              temperature: 0.1,
              max_tokens: 4096
            }')
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$BODY")
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: no response from model"')
          echo "comment<<COMMENT_EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "COMMENT_EOF" >> $GITHUB_OUTPUT

  review-o4-mini:
    needs: get-diff
    if: needs.get-diff.outputs.diff != ''
    runs-on: ubuntu-latest
    outputs:
      comment: ${{ steps.review.outputs.comment }}
    steps:
      - name: o4-mini Mathematical Reasoning Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(jq -n \
            --arg diff "${{ needs.get-diff.outputs.diff }}" \
            '{
              model: "openai/o4-mini",
              messages: [
                {
                  role: "user",
                  content: ("You are a mathematician and formal verification specialist. Analyze this Lean4 proof diff from the RUBIN blockchain formal verification suite step-by-step. Think deeply about: 1) Mathematical correctness of each proof step 2) Whether lemmas actually follow from hypotheses 3) Potential circular reasoning 4) Missing edge cases in inductive proofs 5) Whether the formalization accurately models the real protocol semantics. Rate each finding CRITICAL/HIGH/MEDIUM/LOW/INFO.\n\nDiff:\n\n" + $diff)
                }
              ],
              max_tokens: 4096
            }')
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$BODY")
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: no response from model"')
          echo "comment<<COMMENT_EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "COMMENT_EOF" >> $GITHUB_OUTPUT

  review-deepseek:
    needs: get-diff
    if: needs.get-diff.outputs.diff != ''
    runs-on: ubuntu-latest
    outputs:
      comment: ${{ steps.review.outputs.comment }}
    steps:
      - name: DeepSeek-V3 Independent Proof Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(jq -n \
            --arg diff "${{ needs.get-diff.outputs.diff }}" \
            '{
              model: "deepseek/DeepSeek-V3-0324",
              messages: [
                {
                  role: "system",
                  content: "You are an independent formal methods reviewer providing a second opinion on Lean4 proofs for the RUBIN blockchain protocol. Focus on: 1) Subtle logical gaps other reviewers might miss 2) Overly strong or unjustified assumptions 3) Type-theoretic issues 4) Proof maintainability and readability 5) Whether sorry/admit usage is justified. Output structured markdown with severity levels."
                },
                {
                  role: "user",
                  content: ("Provide an independent review of this Lean proof diff:\n\n" + $diff)
                }
              ],
              temperature: 0.1,
              max_tokens: 4096
            }')
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$BODY")
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: no response from model"')
          echo "comment<<COMMENT_EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "COMMENT_EOF" >> $GITHUB_OUTPUT

  post-summary:
    needs: [review-gpt41, review-o4-mini, review-deepseek]
    if: always() && needs.review-gpt41.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Post multi-model review
        uses: actions/github-script@v7
        with:
          script: |
            const gpt41 = `${{ needs.review-gpt41.outputs.comment }}`;
            const o4mini = `${{ needs.review-o4-mini.outputs.comment }}`;
            const deepseek = `${{ needs.review-deepseek.outputs.comment }}`;
            const body = [
              '## Multi-Model Lean Proof Review (GitHub Models)',
              '',
              '### GPT-4.1 - Formal Verification Analysis',
              gpt41,
              '',
              '---',
              '',
              '### o4-mini - Mathematical Reasoning Review',
              o4mini,
              '',
              '---',
              '',
              '### DeepSeek-V3 - Independent Proof Review',
              deepseek,
              '',
              '---',
              '_Multi-model automated review via GitHub Models. Each model provides an independent perspective. Not a substitute for human proof review._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
